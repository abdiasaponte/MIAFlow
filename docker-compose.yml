services:
  n8n:
    image: n8nio/n8n:latest
    container_name: miaflow-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_SECURE_COOKIE=false
    volumes:
      # Reutiliza la carpeta de datos que ya tenías con la instalación via npm
      # (workflows, credenciales, base SQLite) — no requiere migración de datos.
      - ~/.n8n:/home/node/.n8n
